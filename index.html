<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vial | Electronic Music Producer & DJ</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #00ff88; /* Electric Green - feels very "vial" */
            --secondary: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .profile-title {
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 5px;
            text-transform: lowercase;
        }

        .location {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .bio {
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 15px;
            display: block;
        }

        .links-container {
            display: grid;
            gap: 12px;
        }

        .link-card {
            background: var(--secondary);
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: transform 0.2s, border 0.2s;
            border: 1px solid transparent;
        }

        .link-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .promo {
            border: 1px solid var(--accent);
            background: rgba(0, 255, 136, 0.05);
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="profile-title">vial</h1>
    <div class="location">California, USA</div>
    
    <div class="bio">
        Inland Empire native DJ for 15+ years.<br>
        Music producer with 3 years of experience.<br>
        <strong>Forever sharing new music.</strong>
    </div>

    <span class="section-label">Current Promotion</span>
    <div class="links-container" style="margin-bottom: 30px;">
        <a href="https://hypeddit.com/vialmanifolds/spirits" class="link-card promo" target="_blank">
            🔥 VIAL X MANIFOLD - SPIRITS
        </a>
        <a href="https://drive.google.com/drive/folders/1D87KRHAUD79d4ZTHx5mVptPW_Mjqi0n8" class="link-card" target="_blank">
            Discography (WAV)
        </a>
    </div>

    <span class="section-label">Socials & Contact</span>
    <div class="links-container">
        <a href="https://soundcloud.com/itsvial" class="link-card" target="_blank">SoundCloud</a>
        <a href="https://instagram.com/its.vial" class="link-card" target="_blank">Instagram</a>
        <a href="mailto:vialmusic999@gmail.com" class="link-card">Email (Inquiries)</a>
        <a href="https://discord.com/users/thatonevial" class="link-card">Discord</a>
    </div>

    <footer>
        &copy; 2026 vial edit. Built on Cloudflare.
    </footer>
</div>

</body>
</html>
