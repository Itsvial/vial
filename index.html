<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vial | Electronic Music Producer & DJ</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #00ff88;
            --secondary: #1a1a1a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .profile-title {
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 5px;
            text-transform: lowercase;
        }

        .location {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .bio {
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* Player Styling */
        .player-container {
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            background: var(--secondary);
            border: 1px solid #333;
        }

        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 15px;
            display: block;
        }

        .links-container {
            display: grid;
            gap: 12px;
        }

        .link-card {
            background: var(--secondary);
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .link-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            background: #222;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="profile-title">vial</h1>
    <div class="location">California, USA</div>
    
    <div class="bio">
        Inland Empire native DJ for 15+ years.<br>
        Music producer with 3 years of experience.<br>
        <strong>Forever sharing new music.</strong>
    </div>

    <span class="section-label">Latest Stream</span>
    <div class="player-container">
        <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" 
            src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1792629433&color=%2300ff88&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true">
        </iframe>
    </div>

    <span class="section-label">Discography & Links</span>
    <div class="links-container">
        <a href="https://hypeddit.com/vialmanifolds/spirits" class="link-card" target="_blank" style="border-color: #333;">
            Full Release: SPIRITS
        </a>
        <a href="https://drive.google.com/drive/folders/1D87KRHAUD79d4ZTHx5mVptPW_Mjqi0n8" class="link-card" target="_blank">
            Discography (WAV Archive)
        </a>
        <a href="https://soundcloud.com/itsvial" class="link-card" target="_blank">SoundCloud</a>
        <a href="https://instagram.com/its.vial" class="link-card" target="_blank">Instagram</a>
        <a href="mailto:vialmusic999@gmail.com" class="link-card">Email (Inquiries)</a>
    </div>

    <footer>
        &copy; 2026 vial. Built on Cloudflare.
    </footer>
</div>

</body>
</html>
